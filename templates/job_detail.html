<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Job Detail</title>

    <!-- ✅ FAVICON -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/25/25694.png">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen p-6">

    <!-- NAVBAR -->
    <nav class="bg-white shadow p-4 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">ExecutiveWorkspace</h1>

        <div class="space-x-4">
            <a href="/jobs/" class="font-bold hover:text-blue-600">Jobs</a>
            <a href="/applications/" class="font-bold hover:text-blue-600">My Applications</a>
            <button onclick="logout()" class="text-red-500 font-semibold">Logout</button>
        </div>
    </nav>

    <!-- JOB CARD -->
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">

        <h2 class="text-2xl font-bold mb-4">Job Detail</h2>

        <div id="job" class="space-y-3"></div>

        <!-- RESUME -->
        <input type="file" id="resume" class="mt-4 mb-2 w-full border p-2 rounded">

        <!-- APPLY BUTTON -->
        <button onclick="applyJob()" id="applyBtn"
            class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold shadow">
            Apply for this Job
        </button>

    </div>

    <script>
        function getId() {
            return window.location.pathname.split("/")[2];
        }

        const jobId = getId();

        // ================= LOAD JOB =================
        async function loadJob() {
            try {
                const res = await fetch(`/api/jobs/${jobId}/`);

                if (!res.ok) throw new Error();

                const job = await res.json();

                document.getElementById("job").innerHTML = `
                    <h3 class="text-xl font-bold">${job.title}</h3>
                    <p class="text-gray-500">Company: ${job.company_name}</p>
                    <p class="text-gray-600">${job.description}</p>

                    <p class="text-sm text-gray-400 mt-2">
                        📍 ${job.location} | 💰 ₹${job.salary} | 🕒 ${job.job_type}
                    </p>
                `;

            } catch (error) {
                console.error(error);

                document.getElementById("job").innerHTML = `
                    <div class="text-red-500 text-center">
                        Failed to load job ❌
                    </div>
                `;
            }
        }

        // ================= APPLY JOB =================
        async function applyJob() {
            const token = localStorage.getItem("access");
            const role = localStorage.getItem("role");
            const button = document.getElementById("applyBtn");
            const fileInput = document.getElementById("resume");

            if (!token) {
                window.location.href = "/auth/";
                return;
            }

            if (role !== "candidate") {
                alert("Only candidates can apply ❌");
                return;
            }

            const file = fileInput.files[0];
            if (!file) {
                alert("Please upload resume 📄");
                return;
            }

            const formData = new FormData();
            formData.append("resume", file);

            button.innerText = "Applying...";
            button.disabled = true;

            try {
                const res = await fetch(`/api/jobs/${jobId}/apply/`, {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + token
                    },
                    body: formData
                });

                const data = await res.json();

                if (res.ok) {
                    button.innerText = "Applied ✅";

                    setTimeout(() => {
                        window.location.href = "/applications/";
                    }, 1000);

                } else {
                    alert(
                        data.detail ||
                        (data.non_field_errors ? data.non_field_errors[0] : null) ||
                        "Something went wrong ❌"
                    );

                    button.innerText = "Apply for this Job";
                    button.disabled = false;
                }

            } catch (error) {
                console.error(error);
                button.innerText = "Error ❌";
                button.disabled = false;
            }
        }

        // ================= LOGOUT =================
        function logout() {
            localStorage.clear();
            window.location.href = "/auth/";
        }

        // 🚀 INITIAL LOAD
        loadJob();
    </script>

</body>

</html>
