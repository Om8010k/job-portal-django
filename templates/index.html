<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Job Portal</title>

    <!-- ✅ FAVICON ADDED -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/25/25694.png">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

    <!-- NAVBAR -->
    <nav class="sticky top-0 bg-white shadow p-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-700">ExecutiveWorkspace</h1>

        <div class="space-x-6 flex items-center">

            <!-- JOBS -->
            <a href="/jobs/" class="font-bold text-black hover:text-blue-600 transition">
                Jobs
            </a>

            <!-- LOGIN -->
            <a href="/auth/" class="font-bold text-black hover:text-blue-600 transition">
                Login
            </a>

            <!-- REGISTER -->
            <a href="/auth/">
                <button class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow">
                    Register
                </button>
            </a>

        </div>
    </nav>

    <!-- HERO -->
    <section class="text-center py-24 px-6">
        <h1 class="text-5xl md:text-6xl font-bold mb-6">
            Find your next <span class="text-blue-600">career</span>
        </h1>

        <p class="text-gray-500 text-lg mb-8">
            Discover jobs, apply instantly, and grow your future 🚀
        </p>

        <!-- SEARCH BUTTON -->
        <a href="/jobs/"
            class="inline-block bg-blue-700 hover:bg-blue-800 text-white font-bold px-10 py-4 rounded-xl shadow-lg transition">
            Search Jobs 🚀
        </a>
    </section>

</body>

</html>
