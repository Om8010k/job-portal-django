<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Jobs</title>

    <!-- ✅ FAVICON -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/25/25694.png">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- NAVBAR -->
    <nav class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">ExecutiveWorkspace</h1>

        <div class="space-x-4">
            <a href="/applications/" class="font-bold text-black hover:text-blue-600">
                My Applications
            </a>

            <button onclick="logout()" class="text-red-500 font-semibold">
                Logout
            </button>
        </div>
    </nav>

    <!-- JOB LIST -->
    <div id="jobs" class="max-w-4xl mx-auto mt-10 space-y-4 px-4">
        Loading jobs...
    </div>

    <script>
        // 🔓 LOGOUT
        function logout() {
            localStorage.clear();
            window.location.href = "/auth/";
        }

        // 📥 LOAD JOBS
        async function loadJobs() {
            const container = document.getElementById("jobs");

            if (!container) {
                console.error("jobs container not found");
                return;
            }

            container.innerHTML = "Loading jobs...";

            try {
                const res = await fetch("/api/jobs/");
                const data = await res.json();

                const jobs = data.results || data;
                container.innerHTML = "";

                // ❌ EMPTY STATE
                if (!jobs || jobs.length === 0) {
                    container.innerHTML = `
                        <div class="text-center text-gray-500">
                            No jobs available 😢
                        </div>
                    `;
                    return;
                }

                // ✅ RENDER JOBS
                jobs.forEach(job => {
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded shadow hover:shadow-md transition">
                            <h3 class="text-lg font-bold">${job.title}</h3>
                            <p class="text-gray-500">${job.company_name}</p>
                            <p class="text-sm text-gray-400">${job.location}</p>

                            <div class="mt-2 font-bold text-blue-600">
                                ₹${job.salary}
                            </div>

                            <button onclick="viewJob(${job.id})"
                                class="mt-3 bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">
                                View
                            </button>
                        </div>
                    `;
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="text-center text-red-500">
                        Failed to load jobs ❌
                    </div>
                `;
            }
        }

        // 🔗 VIEW JOB
        function viewJob(id) {
            window.location.href = `/jobs/${id}/`;
        }

        // 🚀 INITIAL LOAD
        loadJobs();
    </script>

</body>

</html>
